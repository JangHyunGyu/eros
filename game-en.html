<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        (function() {
            const CURRENT_VERSION = '1.1.2';
            setTimeout(() => {
                fetch('version.json?t=' + new Date().getTime())
                    .then(response => response.json())
                    .then(data => {
                        if (data.version !== CURRENT_VERSION) {
                            if ('serviceWorker' in navigator) {
                                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                                    for(let registration of registrations) { registration.unregister(); }
                                    window.location.reload(true);
                                });
                            } else { window.location.reload(true); }
                        }
                    }).catch(err => console.error('Version check failed:', err));
            }, 3000);
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Eros - Visual Novel Game</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-05YM7K3VX9"></script>

    <meta name="apple-mobile-web-app-capable" content="yes">

<body>
    <div id="game-container">
        <!-- Background Image -->
        <div id="background-layer"></div>
        
        <!-- Character Layer -->
        <div id="character-layer">
            <div id="char-left" class="char-slot"></div>
            <div id="char-center" class="char-slot"></div>
            <div id="char-right" class="char-slot"></div>
        </div>

        <!-- UI Layer -->
        <div id="ui-layer">
            <div id="dialogue-box">
                <div id="name-tag"></div>
                <div id="message"></div>
                <div id="next-indicator">ˇĺ</div>

                <!-- Name Input -->
                <div id="name-input-container" style="display: none;">
                    <div id="name-input-wrapper">
                        <input type="text" id="player-name-input" placeholder="Enter your name (1-4 chars)" maxlength="4">
                        <button id="name-confirm-btn">Confirm</button>
                    </div>
                    <div id="name-input-guide">1-4 characters (Letters only)</div>
                </div>
            </div>
            
            <div id="choice-container" style="display: none;">
                <!-- Choice buttons will be generated here -->
            </div>

            <!-- Free Talk Input -->
            <div id="chat-container" style="display: none;">
                <div id="chat-input-wrapper">
                    <input type="text" id="chat-input" placeholder="Type a message..." maxlength="100">
                    <button id="chat-send" title="Send">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                    <button id="chat-skip-btn" title="Stop Conversation">
                        <svg viewBox="0 0 24 24">
                            <path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                </div>
                <div id="chat-turn-indicator">Turns left: <span id="turn-count">3</span></div>
            </div>

        </div>

        <!-- Home Button (ui-layer ąŮ±ů, Ç×»ó ÇĄ˝Ă) -->
        <button id="home-btn" onclick="showHomeConfirm()" title="Back to Title">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
            </svg>
        </button>

        <!-- Settings Button -->
        <button id="settings-btn" onclick="openSettingsModal()" title="Settings">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87a.49.49 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"></path>
            </svg>
        </button>

        <!-- Fade Layer -->
        <div id="fade-layer">
            <div id="tbc-text">To Be Continued</div>
        </div>

        <!-- Home Confirm Modal -->
        <div id="homeConfirmModal" class="modal-overlay" style="display: none;" onclick="closeHomeConfirm(event)">
            <div class="modal-container" onclick="event.stopPropagation()">
                <h3 class="modal-title">Return to Title</h3>
                <p style="color: #ccc; margin: 20px 0; line-height: 1.6;">Are you sure you want to return to the title screen?<br><span style="color: #ff6b9d; font-size: 0.9em;">(Current game progress will not be saved)</span></p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="modal-btn" onclick="closeHomeConfirm(event)" style="background: #444;">Cancel</button>
                    <button class="modal-btn" onclick="goToHome()" style="background: linear-gradient(135deg, #ff6b9d, #c44569);">Confirm</button>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal-overlay" style="display: none;" onclick="closeSettingsModal(event)">
            <div class="modal-container" onclick="event.stopPropagation()">
                <h3 class="modal-title">Settings</h3>
                <div class="settings-options" style="text-align: left; padding: 0 20px;">
                    <label style="display: flex; align-items: center; justify-content: space-between; color: white; cursor: pointer;">
                        <span>?? Show Affinity Gauge</span>
                        <input type="checkbox" id="affinityToggle" checked style="transform: scale(1.5);">
                    </label>
                    <p style="font-size: 0.8rem; color: #aaa; margin-top: 10px; margin-bottom: 20px;">Displays character affinity as a gauge next to their names.</p>
                    
                    <div style="margin-top: 20px;">
                        <div style="display: flex; justify-content: space-between; color: white; margin-bottom: 5px;">
                            <span>?? BGM Volume</span>
                            <span id="bgmVolumeVal">50%</span>
                        </div>
                        <input type="range" id="bgmVolume" min="0" max="100" value="50" style="width: 100%; accent-color: #ff69b4;">
                    </div>
                    
                    <div style="margin-top: 15px;">
                        <div style="display: flex; justify-content: space-between; color: white; margin-bottom: 5px;">
                            <span>?? SFX Volume</span>
                            <span id="sfxVolumeVal">50%</span>
                        </div>
                        <input type="range" id="sfxVolume" min="0" max="100" value="50" style="width: 100%; accent-color: #ff69b4;">
                    </div>
                </div>
                <button onclick="saveSettings()" style="margin-top: 20px; background: #ff69b4; border: none; padding: 10px 30px; border-radius: 20px; color: white; cursor: pointer; font-size: 1rem;">Save</button>
            </div>
        </div>

        <!-- Custom Modal -->
        <div id="custom-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <p id="modal-message"></p>
                <div class="modal-buttons">
                    <button id="modal-confirm-btn">Confirm</button>
                    <button id="modal-cancel-btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Day 1 Scenario -->
